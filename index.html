<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>Gestionnaire de Notes Avancé</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>🎓 Gestionnaire de Notes</h1>

<div id="auth">

<h2>Créer un compte</h2>

<input type="text" id="registerUser" placeholder="Utilisateur">
<input type="password" id="registerPass" placeholder="Mot de passe">

<button id="registerBtn">Créer un compte</button>

<p id="registerMsg"></p>

<h2>Connexion</h2>

<input type="text" id="loginUser" placeholder="Utilisateur">
<input type="password" id="loginPass" placeholder="Mot de passe">

<button id="loginBtn">Connexion</button>

<p id="loginMsg"></p>

</div>

<div id="app">

<div class="topbar">

<h2>Bienvenue <span id="currentUser"></span></h2>

<button id="logoutBtn">Déconnexion</button>

</div>

<hr>

<h3>Ajouter une note</h3>

<input type="text" id="matiere" placeholder="Matière">

<input type="number" id="note" placeholder="Note">

<input type="number" id="coef" placeholder="Coefficient">

<button id="addNoteBtn">Ajouter</button>

<p id="noteMsg"></p>

<hr>

<h3>Rechercher une matière</h3>

<input type="text" id="searchInput" placeholder="Rechercher...">

<hr>

<h3>Liste des notes</h3>

<ul id="notesList"></ul>

<hr>

<h3>Statistiques</h3>

<div id="stats"></div>

<h2>Moyenne générale : <span id="moyenne">0</span></h2>

</div>

<script src="script.js"></script>

</body>
</html>
