<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<title>Gestionnaire de Notes Pro+</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<header>

<h1>🎓 Dashboard de Notes</h1>

<div>

<button id="themeBtn">🌙</button>
<button id="exportPDF">Exporter PDF</button>

</div>

</header>

<div id="auth">

<h2>Créer un compte</h2>

<input id="registerUser" placeholder="Utilisateur">
<input id="registerPass" type="password" placeholder="Mot de passe">

<button id="registerBtn">Créer</button>

<p id="registerMsg"></p>

<h2>Connexion</h2>

<input id="loginUser" placeholder="Utilisateur">
<input id="loginPass" type="password" placeholder="Mot de passe">

<button id="loginBtn">Connexion</button>

<p id="loginMsg"></p>

</div>

<div id="app">

<div class="top">

<h2>Bienvenue <span id="currentUser"></span></h2>

<button id="logoutBtn">Déconnexion</button>

</div>

<section class="add">

<h3>Ajouter une note</h3>

<input id="matiere" placeholder="Matière">
<input id="note" type="number" placeholder="Note">
<input id="coef" type="number" placeholder="Coef">

<button id="addNoteBtn">Ajouter</button>

</section>

<section>

<h3>Recherche</h3>

<input id="searchInput" placeholder="Rechercher">

</section>

<section>

<h3>Notes</h3>

<ul id="notesList"></ul>

</section>

<section>

<h3>Statistiques</h3>

<div id="stats"></div>

<h2>Moyenne générale : <span id="moyenne">0</span></h2>

</section>

<section>

<h3>Moyenne par matière</h3>

<div id="subjectAverage"></div>

</section>

<section>

<h3>Graphique</h3>

<canvas id="chart"></canvas>

</section>

</div>

<script src="script.js"></script>

</body>
</html>
