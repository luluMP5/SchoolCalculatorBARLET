<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Gestion de Notes</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<!-- ===== AUTHENTIFICATION ===== -->
<div id="auth">
    <h2>Inscription</h2>
    <input type="text" id="registerUser" placeholder="Nom d'utilisateur">
    <input type="password" id="registerPass" placeholder="Mot de passe">
    <button id="registerBtn">S'inscrire</button>
    <div id="registerMsg" class="msg"></div>

    <h2>Connexion</h2>
    <input type="text" id="loginUser" placeholder="Nom d'utilisateur">
    <input type="password" id="loginPass" placeholder="Mot de passe">
    <button id="loginBtn">Se connecter</button>
    <div id="loginMsg" class="msg"></div>
</div>

<!-- ===== APPLICATION ===== -->
<div id="app" style="display:none;">
    <div class="header">
        <span>Utilisateur : <span id="currentUser"></span></span>
        <button id="logoutBtn">Déconnexion</button>
        <button id="themeBtn">Thème Sombre</button>
    </div>

    <h2>Ajouter une note</h2>
    <input type="text" id="matiere" placeholder="Matière">
    <input type="number" id="note" placeholder="Note">
    <input type="number" id="coef" placeholder="Coefficient">
    <button id="addNoteBtn">Ajouter</button>

    <h2>Rechercher par matière</h2>
    <input type="text" id="searchInput" placeholder="Recherche...">

    <h2>Notes</h2>
    <ul id="notesList"></ul>

    <h2>Statistiques</h2>
    <div id="stats"></div>
    <div>Moyenne générale : <span id="moyenne">0</span></div>
    <h3>Moyenne par matière</h3>
    <div id="subjectAverage"></div>

    <h2>Graphique</h2>
    <canvas id="chart"></canvas>

    <button id="exportPDF">Exporter PDF</button>
</div>

<script src="script.js"></script>
</body>
</html>
